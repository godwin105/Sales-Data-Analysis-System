<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Reports — Biashara App</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .two-col { display:grid; grid-template-columns:340px 1fr; gap:20px; align-items:start; }
    label { font-size:12px; font-weight:600; color:#64748B; margin-bottom:5px; display:block; }
    input, select { width:100%; border:1px solid #E2E8F0; border-radius:8px; padding:9px 12px; font-size:13px; font-family:inherit; outline:none; background:#F8FAFC; margin-bottom:14px; }
    .preview-row { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #E2E8F0; font-size:13px; }
    .preview-row:last-child { border:none; }
  </style>
</head>
<body>
<script src="layout.js"></script>
<script>renderLayout('reports','Reports');</script>

<script>
const body = document.getElementById('page-body');
body.innerHTML = `
  <div id="dl-alert" class="alert-success-custom" style="display:none;">📄 PDF report is being generated and will download shortly.</div>
  <div class="two-col">
    <!-- Controls -->
    <div class="card-custom">
      <div style="font-size:14px;font-weight:700;margin-bottom:18px;">Generate Report</div>
      <label>Report Type</label>
      <select>
        <option>Sales & Expenses Summary</option>
        <option>Sales Only</option>
        <option>Expenses Only</option>
        <option>Profit & Loss Statement</option>
      </select>
      <label>Period</label>
      <select onchange="changePeriod(this.value)">
        <option>Monthly</option>
        <option>Weekly</option>
        <option>Daily</option>
        <option>Custom Range</option>
      </select>
      <div id="date-range" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div><label>From</label><input type="date" value="2026-02-01"/></div>
        <div><label>To</label><input type="date" value="2026-02-19"/></div>
      </div>
      <button class="btn-primary-custom" onclick="previewReport()" style="width:100%;padding:11px;margin-bottom:10px;">Preview Report</button>
      <button onclick="downloadPDF()" style="width:100%;background:#DC2626;color:#fff;border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">
        📄 Download PDF Report
      </button>
    </div>

    <!-- Preview -->
    <div class="card-custom" id="preview-box">
      <div style="font-size:14px;font-weight:700;margin-bottom:4px;">Report Preview</div>
      <div style="font-size:11px;color:#64748B;margin-bottom:18px;">Sales & Expenses Summary — February 2026</div>

      <div style="font-size:12px;font-weight:700;color:#64748B;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px;">Revenue</div>
      <div class="preview-row"><span>Total Sales Transactions</span><strong>47</strong></div>
      <div class="preview-row"><span>Gross Revenue</span><strong style="color:#2563EB;">TZS 3,080,000</strong></div>
      <div class="preview-row" style="margin-bottom:16px;"><span>Average Sale Value</span><strong>TZS 65,532</strong></div>

      <div style="font-size:12px;font-weight:700;color:#64748B;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px;">Expenses</div>
      <div class="preview-row"><span>Rent</span><strong>TZS 500,000</strong></div>
      <div class="preview-row"><span>Salaries</span><strong>TZS 800,000</strong></div>
      <div class="preview-row"><span>Utilities</span><strong>TZS 95,000</strong></div>
      <div class="preview-row"><span>Purchase Costs</span><strong>TZS 450,000</strong></div>
      <div class="preview-row"><span>Miscellaneous</span><strong>TZS 80,000</strong></div>
      <div class="preview-row" style="margin-bottom:16px;"><span><strong>Total Expenses</strong></span><strong style="color:#DC2626;">TZS 1,925,000</strong></div>

      <div style="background:#F0FDF4;border-radius:10px;padding:16px;display:flex;justify-content:space-between;align-items:center;">
        <span style="font-weight:700;font-size:14px;">Net Profit</span>
        <span style="font-size:22px;font-weight:800;color:#16A34A;">TZS 1,155,000</span>
      </div>
    </div>
  </div>
`;

function changePeriod(val) {
  document.getElementById('date-range').style.display = val === 'Custom Range' ? 'grid' : 'none';
}

function previewReport() {
  // already shown, just flash it
  const box = document.getElementById('preview-box');
  box.style.outline = '2px solid #2563EB';
  setTimeout(() => box.style.outline = 'none', 600);
}

function downloadPDF() {
  const alert = document.getElementById('dl-alert');
  alert.style.display = 'block';
  setTimeout(() => alert.style.display = 'none', 4000);
}
</script>
</body>
</html>
